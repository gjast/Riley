# Запуск бэкенда: docker compose up --build
#
# Схема портов:
#   PORT — порт Node внутри контейнера (по умолчанию 8787).
#   На хост публикуется: PUBLISH_PORT, если задан, иначе API_PORT из .env, иначе 8787.
#
# «bind: address already in use» на 0.0.0.0:4000 — порт на хосте занят
# (часто npm run dev). Решения:
#   • npm run docker:api — если 4000 занят, сам выставит PUBLISH_PORT=4001
#   • вручную: PUBLISH_PORT=4001 docker compose up --build
#   • или остановите процесс на 4000; «сырой» compose: npm run docker:api:raw

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${PUBLISH_PORT:-${API_PORT:-8787}}:${PORT:-8787}"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env (see .env.example)}
      PORT: ${PORT:-8787}
    volumes:
      - relaylend_cases:/app/server/data
    restart: unless-stopped

volumes:
  relaylend_cases:
