# Запуск бэкенда: docker compose up --build
# Порты: PORT — порт процесса внутри контейнера; API_PORT — порт на хосте (по умолчанию = 8787 и для хоста, если API_PORT не задан)
# После смены PORT/API_PORT: docker compose up -d --force-recreate

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${API_PORT:-8787}:${PORT:-8787}"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env (see .env.example)}
      PORT: ${PORT:-8787}
    volumes:
      - relaylend_cases:/app/server/data
    restart: unless-stopped

volumes:
  relaylend_cases:
