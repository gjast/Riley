

# HTTP → HTTPS
# При обновлении сертификата через http-01 добавьте сюда:
#   location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; try_files $uri =404; }
# и временно не редиректить этот путь на HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name relayhell.com www.relayhell.com;
    return 301 https://relayhell.com$request_uri;
}

# HTTPS: www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.relayhell.com;

    ssl_certificate     /etc/letsencrypt/live/relayhell.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relayhell.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL_RELAYHELL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://relayhell.com$request_uri;
}

# HTTPS: сайт
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name relayhell.com;

    ssl_certificate     /etc/letsencrypt/live/relayhell.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relayhell.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL_RELAYHELL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /var/log/nginx/relayhell.access.log;
    error_log  /var/log/nginx/relayhell.error.log warn;

    root /var/www/Riley/dist;
    index index.html;

    # HSTS (после того как убедились, что HTTPS везде ок)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Бэкенд: express.json до 50MB + multipart; запас на заголовки
    client_max_body_size 64m;
    client_body_buffer_size 256k;

    # Прокси API (IP в Telegram: X-Forwarded-For / X-Real-IP)
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        # Дублируем no-store у бэкенда (GET /api/cases и т.д.)
        add_header Cache-Control "no-store" always;

        proxy_connect_timeout 75s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_buffering off;
    }

    # Vite hashed assets
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Статика из public/ (иконки, картинки кейсов и т.д.)
    location ~* \.(?:ico|png|jpg|jpeg|webp|gif|svg|woff2?|ttf|eot)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
