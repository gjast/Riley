# relayhell.com — Vite SPA + прокси /api на Node.
#
# Если видите «500 Internal Server Error» с подписью nginx:
#   sudo tail -50 /var/log/nginx/relayhell.error.log
#   sudo tail -50 /var/log/nginx/error.log
# Частые причины: нет прав на root (chmod/chown для www-data), неверный путь к dist,
# второй server { } с тем же server_name на 443, или (для /api) падение Node — смотрите журнал API.
#
# Установка:
#   sudo cp .../relayhell.com.conf /etc/nginx/sites-available/relayhell.com
#   sudo ln -sf /etc/nginx/sites-available/relayhell.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name relayhell.com www.relayhell.com;
    return 301 https://relayhell.com$request_uri;
}

# HTTPS: www → apex
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.relayhell.com;

    ssl_certificate     /etc/letsencrypt/live/relayhell.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relayhell.com/privkey.pem;

    return 301 https://relayhell.com$request_uri;
}

# HTTPS: сайт
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name relayhell.com;

    ssl_certificate     /etc/letsencrypt/live/relayhell.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relayhell.com/privkey.pem;

    # Логи только этого сайта (удобно искать причину 500)
    access_log /var/log/nginx/relayhell.access.log;
    error_log  /var/log/nginx/relayhell.error.log warn;

    # Путь к результату `npm run build` (должен существовать; чтение для www-data)
    root /var/www/RelayLend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Большие JSON при сохранении кейсов
    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        try_files $uri /index.html;
    }
}
